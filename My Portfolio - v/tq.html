<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <link rel="stylesheet" href="style12.css">

    <style>
        .thankyou-container{
            max-width:700px;
            margin:100px auto;
            padding:30px;
            background:white;
            text-align:center;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        .thankyou-container h1{
            color:green;
            margin-bottom:20px;
        }

        .thankyou-container p{
            font-size:18px;
            margin-bottom:25px;
            text-align:center;
        }

        .back-btn{
            display:inline-block;
            padding:12px 25px;
            background:#007BFF;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .back-btn:hover{
            background:#0056b3;
        }
    </style>

</head>

<body>

<div class="thankyou-container">

    <h1>🎉 Thank You!</h1>

    <p>
        Thank you for visiting my portfolio and submitting your details.
        I appreciate your time and interest.
    </p>

    <a href="port.html" class="back-btn">
        ⬅ Back to Portfolio
    </a>

</div>

</body>
</html>
